# Production edge proxy. Terminates client traffic and fans out to the built
# frontend image and the gunicorn backend. Static/media are served by the
# backend (whitenoise) here; swap to a CDN / object store later as needed.
#
# Sticky-session note: when active-exam session affinity is introduced, add
# ip_hash (or a cookie-based balancer) to the backend upstream below.

upstream backend {
    server backend:8000;
}
upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Reasonable upload ceiling for .docx exam imports; tune as needed.
    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }
    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
