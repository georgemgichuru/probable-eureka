# nginx config baked into the frontend image. Serves the built SPA with a
# history-API fallback. In production the edge proxy (../nginx/default.conf)
# sits in front of this and routes /api to the backend.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the service worker or the app shell.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Hashed assets can be cached aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
