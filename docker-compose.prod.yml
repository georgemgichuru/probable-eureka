# Production-like stack. No source bind-mounts; images are built and run as-is.
# Usage: docker compose -f docker-compose.prod.yml up --build -d
#
# This is a single-host baseline. Horizontal scaling (multiple backend/worker
# replicas), managed Postgres with a read replica, and TLS termination are layered
# on top of this in deployment infra (documented in the plan's deferred section).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    env_file:
      - .env
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  staticfiles:
  media:
